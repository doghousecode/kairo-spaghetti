<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0D0D0F" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/apple-icon.png" />
    <title>Kairo · Spaghetti Wall</title>
    <style>
      body { margin: 0; padding: 0; background: #0D0D0F; }
    </style>
  </head>
  <body>
    <div id="kairo-splash" style="position:fixed;inset:0;z-index:9999;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;pointer-events:none;">
      <img src="/kairo-wordmark-cropped.png" alt="Kairo" style="width:68vw;max-width:680px;height:auto;" />
      <p style="color:rgba(240,240,240,0.35);font-size:clamp(0.65rem,2vw,0.85rem);letter-spacing:0.18em;text-transform:lowercase;font-weight:400;margin:0;font-family:system-ui,sans-serif;">
        spaghetti wall
      </p>
    </div>

    <div id="kairo-root" style="opacity:0">
      <div id="root"></div>
    </div>

    <script>
      (function() {
        var splash = document.getElementById('kairo-splash');
        var root   = document.getElementById('kairo-root');
        var done   = false;

        function show() {
          if (done) return;
          done = true;
          if (root)   { root.style.transition = 'opacity 0.5s ease'; root.style.opacity = '1'; }
          if (splash) { splash.style.transition = 'opacity 0.8s ease'; splash.style.opacity = '0'; splash.style.pointerEvents = 'none'; }
        }

        window.kairoReady = show;
        setTimeout(show, 4000);

        window.kairoShowSplash = function() {
          if (!splash) return;
          splash.style.transition    = 'opacity 0.4s ease';
          splash.style.opacity       = '1';
          splash.style.pointerEvents = 'auto';
          splash.style.cursor        = 'pointer';
          done = false;
          splash.addEventListener('click', show, { once: true });
        };
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
