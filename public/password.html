<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kairo — Enter Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: 100%;
      max-width: 360px;
      padding: 24px;
    }

    .wordmark {
      height: 36px;
      width: auto;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]::placeholder { color: #555; }
    input[type="password"]:focus { border-color: #555; }

    button {
      width: 100%;
      padding: 12px 16px;
      background: #fff;
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .error {
      font-size: 13px;
      color: #ff6b6b;
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="gate">
    <img src="/kairo-wordmark-cropped.png" alt="Kairo" class="wordmark" />
    <form id="form">
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" autofocus />
      <button type="submit" id="btn">Enter</button>
      <p class="error" id="error"></p>
    </form>
  </div>

  <script>
    const form = document.getElementById('form')
    const input = document.getElementById('password')
    const btn = document.getElementById('btn')
    const error = document.getElementById('error')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      error.textContent = ''
      btn.disabled = true
      btn.textContent = 'Checking…'

      try {
        const res = await fetch('/api/password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: input.value }),
        })
        const data = await res.json()
        if (data.ok) {
          window.location.replace('/')
        } else {
          error.textContent = data.error || 'Incorrect password'
          btn.disabled = false
          btn.textContent = 'Enter'
          input.select()
        }
      } catch {
        error.textContent = 'Something went wrong, please try again'
        btn.disabled = false
        btn.textContent = 'Enter'
      }
    })
  </script>
</body>
</html>
